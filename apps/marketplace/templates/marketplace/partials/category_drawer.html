<!-- Category Drawer — slide in from left -->

<!-- Overlay -->
<div id="drawer-overlay"
     onclick="toggleDrawer()"
     class="hidden fixed inset-0 z-40 bg-black/40 backdrop-blur-sm transition">
</div>

<!-- Drawer panel -->
<div id="category-drawer"
     class="drawer drawer-closed fixed top-0 left-0 z-50 h-full w-72 bg-white shadow-2xl flex flex-col">

  <!-- Header -->
  <div class="flex items-center justify-between px-5 h-16 border-b border-border shrink-0">
    <span class="font-display font-bold text-lg text-dark">Categories</span>
    <button onclick="toggleDrawer()" class="p-2 rounded-xl hover:bg-surface transition">
      <svg class="w-5 h-5 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Category list -->
  <div class="flex-1 overflow-y-auto py-3">
    {% for category in categories %}
    <a href="{% url 'marketplace:product_list' %}?category={{ category.slug }}"
       onclick="toggleDrawer()"
       class="flex items-center gap-4 px-5 py-3.5 hover:bg-surface active:bg-primary/5 transition group">

      <!-- Icon placeholder circle -->
      <div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center shrink-0 group-hover:bg-primary/20 transition">
        {% if category.icon %}
          <span class="text-lg">{{ category.icon }}</span>
        {% else %}
          <!-- Default grid icon -->
          <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
          </svg>
        {% endif %}
      </div>

      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold text-dark truncate">{{ category.name }}</p>
        <p class="text-xs text-muted">{{ category.subcategories.count }} subcategories</p>
      </div>

      <svg class="w-4 h-4 text-muted group-hover:text-primary transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
    </a>
    {% endfor %}
  </div>

  <!-- Footer -->
  <div class="px-5 py-4 border-t border-border shrink-0">
    <a href="{% url 'marketplace:product_list' %}"
       onclick="toggleDrawer()"
       class="block w-full text-center py-3 bg-primary text-white text-sm font-semibold rounded-xl hover:bg-primary-dark transition">
      Browse All Products
    </a>
  </div>
</div>
